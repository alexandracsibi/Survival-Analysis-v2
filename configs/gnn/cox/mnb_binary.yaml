seed: 42
device: auto

dataset:
  name: MNB
  data_root: data

model:
  name: GraphSAGECox
  hidden_dims: [128, 64]
  dropout: 0.2

graph:
  k: 5
  metric: euclidean
  include_self: false
  make_undirected: true
  edge_index_path: data/MNB/graphs/knn_k5_euclidean_edge_index.npy

  preprocessing_note: >
    Graph is built from the prepared MNB feature matrix loaded from X_train,
    X_val, and X_test after preprocessing/scaling/encoding. The graph uses only
    X features and no labels, event times, outcomes, or model predictions.

  included_feature_groups:
    - final numeric features
    - retained categorical one-hot feature groups

  dropped_feature_groups:
    - BORROWER_COUNTY_*
    - CONTRACT_LOAN_TYPE_*

sampling:
  enabled: true
  batch_size: 8192
  num_neighbors: [10, 10]

training:
  lr: 0.001
  weight_decay: 0.0001
  epochs: 50

early_stopping:
  enabled: true
  monitor: val_cindex
  mode: max
  patience: 5
  min_delta: 0.0001