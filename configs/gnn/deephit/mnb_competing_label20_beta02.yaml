seed: 42
device: auto

dataset:
  name: MNB
  data_root: data

model:
  name: GraphSAGEDeepHit
  hidden_dims: [128, 64]
  dropout: 0.2

deephit:
  n_time_bins: 50
  binning: quantile
  alpha: 0.8
  beta: 0.2
  sigma: 0.1
  max_rank_pairs: null

graph:
  k: 5
  metric: euclidean
  include_self: false
  make_undirected: true
  batch_size: 100000
  edge_index_path: data/MNB/graphs/knn_k5_euclidean_edge_index.npy

  preprocessing_note: >
    Graph is built from the prepared MNB feature matrix loaded from X_train,
    X_val, and X_test. These arrays are already in the final prepared feature
    format. The graph uses only X features and no labels, event times, outcomes,
    or model predictions.

  included_feature_groups:
    - numerical features
    - encoded categorical features

  dropped_feature_groups:
    - BORROWER_COUNTY
    - CONTRACT_LOAN_TYPE

sampling:
  enabled: true
  batch_size: 4096
  num_neighbors: [5, 5]

training:
  lr: 0.001
  weight_decay: 0.0001
  epochs: 50

early_stopping:
  enabled: true
  monitor: val_mean_cindex
  mode: max
  patience: 6
  min_delta: 0.0001

semi_supervised:
  enabled: true
  strategy: event_fraction
  labeled_event_fraction: 0.2
  min_labeled_events: 1000
  keep_censored_in_supervised: true
  seed: 42