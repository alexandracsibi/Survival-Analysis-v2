seed: 42
device: auto

dataset:
  name: synthetic_binary
  data_root: data

graph:
  k: 10
  metric: euclidean
  include_self: false
  make_undirected: true
  edge_index_path: data/synthetic_binary/graphs/knn_k10_euclidean_edge_index.npy

sampling:
  enabled: true
  batch_size: 4096
  num_neighbors: [5, 5]

model:
  name: GraphSAGEDeepHit
  hidden_dims: [64, 32]
  dropout: 0.2

deephit:
  n_time_bins: 50
  binning: quantile
  alpha: 1.0
  beta: 0.1
  sigma: 0.1
  max_rank_pairs: null

training:
  lr: 0.001
  weight_decay: 0.0001
  epochs: 75

early_stopping:
  enabled: true
  monitor: val_cindex
  mode: max
  patience: 5
  min_delta: 0.0001