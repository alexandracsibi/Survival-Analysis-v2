seed: 42
device: auto

dataset:
  name: MNB
  data_root: data

model:
  name: DeepHit
  hidden_dims: [128, 64]
  dropout: 0.2

deephit:
  n_time_bins: 50
  binning: quantile
  alpha: 1.0
  beta: 0.0
  sigma: 0.1

training:
  batch_size: 1024
  lr: 0.001
  weight_decay: 0.0001
  epochs: 1

early_stopping:
  enabled: false
  monitor: val_cindex
  mode: max
  patience: 5
  min_delta: 0.0001